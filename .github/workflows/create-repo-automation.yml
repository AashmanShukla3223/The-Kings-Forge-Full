name: Generate Repo for Executable Every 2 Days

on:
  schedule:
    # Run every 2 days at 00:00 UTC
    - cron: '0 0 */2 * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    
    # IMPORTANT: The default GITHUB_TOKEN does not have permissions to create NEW repositories.
    # You MUST create a Personal Access Token (classic) with the 'repo' scope,
    # and add it as a Repository Secret named 'GH_PAT' to this repository.
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install stable-x86_64-pc-windows-gnu toolchain
      run: rustup toolchain install stable-x86_64-pc-windows-gnu
      
    - name: Default to GNU toolchain
      run: rustup default stable-x86_64-pc-windows-gnu

    - name: Build Executable
      run: cargo build --release --verbose

    - name: Generate Dynamic Repository Name
      id: repo_name
      shell: pwsh
      run: |
        $date = Get-Date -Format "yyyy-MM-dd"
        $repoName = "exe-build-$date"
        echo "REPO_NAME=$repoName" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Setup Git Configuration
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create Repo and Push Executable
      shell: pwsh
      run: |
        # Check if the secret is available
        if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
          Write-Error "GH_PAT secret is missing. You must configure a Personal Access Token with 'repo' permissions to create new repositories."
          exit 1
        }
        
        # Create a fresh directory to host the new standalone repository containing the exe
        $publishDir = "publish_dir"
        New-Item -ItemType Directory -Path $publishDir
        
        # Attempt to copy the .exe file (assuming Rust build outputs an .exe in target/release)
        $exeFiles = Get-ChildItem -Path "target/release/*.exe" -ErrorAction SilentlyContinue
        if ($exeFiles.Count -eq 0) {
          Write-Error "No executable found in target/release/ after build."
          exit 1
        }
        
        Copy-Item -Path $exeFiles[0].FullName -Destination "$publishDir\"
        
        # Add a placeholder README
        $readmeContent = "# Build Executable: $env:REPO_NAME`n`nAutomated 48-hour cycle executable generated by system at $(Get-Date)."
        Set-Content -Path "$publishDir\README.md" -Value $readmeContent
        
        Set-Location $publishDir
        
        # Initialize git repo locally
        git init
        git add .
        git commit -m "Automated build release: $env:REPO_NAME"
        
        # Create remote repository (public) using gh CLI
        # --source=. automatically pairs and pushes the local repository up
        Write-Host "Creating new repository: $env:REPO_NAME"
        gh repo create "$env:REPO_NAME" --public --source=. --host github.com --push
        
        Write-Host "Repository creation and push complete!"
